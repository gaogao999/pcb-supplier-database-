      <stop offset="0" stop-color="#35e0a1"/>
      <stop offset="1" stop-color="#0e9e6c"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0b25f"/>
      <stop offset="1" stop-color="#c9803a"/>
